version: '3.8'
services:
  client:
    build: .
    container_name: my-container
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules

  api:
    build: ./api
    container_name: api
    ports:
      - "3000:3000"
      - "5555:5555" # npx prisma studio
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - DATABASE_URL=postgresql://postgres:password@db:5432/todo_db?schema=public
  db:
      image: postgres:15-alpine
      container_name: todo-db
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
        POSTGRES_DB: todo_db
      ports:
        - "5433:5432" # 5432を別プロジェクトで使用しているため
      volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: